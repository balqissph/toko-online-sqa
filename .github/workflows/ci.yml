name: SQA CI & CT Pipeline
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup PHP Environment
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.2'
        coverage: xdebug

    - name: Install PHP Dependencies
      run: composer install --prefer-dist --no-progress

    - name: Start PHP Server in Background
      run: php -S localhost:8000 &

    - name: Wait for PHP Server
      run: sleep 2

    - name: Start ChromeDriver in Background
      run: |
        chromedriver --port=9515 --url-base=wd/hub &
        sleep 2

    - name: Run All Automated Tests & Quality Metrics
      run: |
        chmod +x vendor/bin/phpunit
        vendor/bin/phpunit tests/CatalogTest.php tests/CheckoutTest.php --coverage-text